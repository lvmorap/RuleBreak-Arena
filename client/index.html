<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuleBreak Arena</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    canvas {
      display: block;
    }
    
    /* UI Overlay */
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    /* Mode Display */
    #mode-display {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 30px;
      border-radius: 25px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      border: 2px solid #4ecdc4;
    }
    
    /* Timer Display */
    #timer-display {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      text-align: center;
    }
    
    #timer-display .mode-timer {
      font-size: 32px;
      font-weight: bold;
      color: #f39c12;
    }
    
    #timer-display .match-timer {
      font-size: 18px;
      color: #95a5a6;
      margin-top: 5px;
    }
    
    /* Scoreboard */
    #scoreboard {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 10px;
      color: white;
      min-width: 200px;
    }
    
    #scoreboard h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #4ecdc4;
      border-bottom: 1px solid #4ecdc4;
      padding-bottom: 5px;
    }
    
    .score-entry {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 14px;
    }
    
    .score-entry.team-a {
      color: #3498db;
    }
    
    .score-entry.team-b {
      color: #e74c3c;
    }
    
    .score-entry.self {
      font-weight: bold;
    }
    
    /* Mode Change Announcement */
    #mode-announcement {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 40px 80px;
      border-radius: 20px;
      text-align: center;
      display: none;
      z-index: 100;
      border: 3px solid #f39c12;
    }
    
    #mode-announcement.visible {
      display: block;
      animation: pulse 0.5s ease-in-out;
    }
    
    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.1); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    
    #mode-announcement h1 {
      font-size: 48px;
      color: #f39c12;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    
    #mode-announcement p {
      font-size: 24px;
      color: white;
    }
    
    /* Match End Screen */
    #match-end-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 200;
    }
    
    #match-end-screen.visible {
      display: flex;
    }
    
    #match-end-screen h1 {
      font-size: 64px;
      color: #f39c12;
      margin-bottom: 30px;
    }
    
    #match-end-screen .final-scores {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px 50px;
      border-radius: 15px;
      margin-bottom: 30px;
    }
    
    #match-end-screen .final-scores h2 {
      color: #4ecdc4;
      margin-bottom: 20px;
      font-size: 28px;
    }
    
    #match-end-screen .score-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 20px;
      color: white;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    #match-end-screen .score-row.winner {
      color: #f39c12;
      font-weight: bold;
    }
    
    /* Controls Help */
    #controls-help {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 10px;
      color: white;
      font-size: 12px;
    }
    
    #controls-help h4 {
      color: #4ecdc4;
      margin-bottom: 8px;
    }
    
    #controls-help span {
      display: block;
      margin: 3px 0;
    }
    
    #controls-help kbd {
      background: #4ecdc4;
      color: #1a1a2e;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
    }
    
    /* Connection Status */
    #connection-status {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }
    
    #connection-status.connected {
      border: 2px solid #2ecc71;
    }
    
    #connection-status.disconnected {
      border: 2px solid #e74c3c;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- Three.js canvas will be inserted here -->
    
    <!-- UI Overlay -->
    <div id="ui-overlay">
      <!-- Mode Display -->
      <div id="mode-display">GOAL MODE</div>
      
      <!-- Timer -->
      <div id="timer-display">
        <div class="mode-timer">60</div>
        <div class="match-timer">Match: 5:00</div>
      </div>
      
      <!-- Scoreboard -->
      <div id="scoreboard">
        <h3>SCOREBOARD</h3>
        <div id="score-list">
          <!-- Scores will be populated here -->
        </div>
      </div>
      
      <!-- Mode Change Announcement -->
      <div id="mode-announcement">
        <h1 id="new-mode-name">HOLD MODE</h1>
        <p id="mode-description">Hold the ball to score!</p>
      </div>
      
      <!-- Match End Screen -->
      <div id="match-end-screen">
        <h1>MATCH OVER</h1>
        <div class="final-scores">
          <h2>Final Scores</h2>
          <div id="final-score-list">
            <!-- Final scores will be populated here -->
          </div>
        </div>
      </div>
      
      <!-- Controls Help -->
      <div id="controls-help">
        <h4>Controls</h4>
        <span><kbd>W A S D</kbd> - Move</span>
        <span><kbd>SHIFT</kbd> - Dash</span>
        <span><kbd>SPACE</kbd> - Push</span>
      </div>
      
      <!-- Connection Status -->
      <div id="connection-status" class="disconnected">
        Connecting...
      </div>
    </div>
  </div>
  
  <script type="module" src="./main.js"></script>
</body>
</html>
